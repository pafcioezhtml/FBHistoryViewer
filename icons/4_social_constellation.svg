<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#4527a0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg4)"/>

  <!-- Subtle radial glow -->
  <circle cx="256" cy="240" r="200" fill="url(#glow)"/>

  <!-- Connection lines (constellation style) -->
  <line x1="256" y1="200" x2="160" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="256" y1="200" x2="350" y2="140" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="256" y1="200" x2="140" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="256" y1="200" x2="370" y2="270" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="256" y1="200" x2="190" y2="340" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="256" y1="200" x2="320" y2="350" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Cross connections -->
  <line x1="160" y1="150" x2="140" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="350" y1="140" x2="370" y2="270" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="140" y1="280" x2="190" y2="340" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="370" y1="270" x2="320" y2="350" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="190" y1="340" x2="320" y2="350" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Central person (you) - larger -->
  <circle cx="256" cy="185" r="28" fill="rgba(79,195,247,0.2)" stroke="#4fc3f7" stroke-width="2"/>
  <circle cx="256" cy="175" r="12" fill="#4fc3f7"/>
  <ellipse cx="256" cy="198" rx="16" ry="11" fill="#4fc3f7"/>

  <!-- Person top-left -->
  <circle cx="160" cy="135" r="18" fill="rgba(206,147,216,0.2)" stroke="#ce93d8" stroke-width="1.5"/>
  <circle cx="160" cy="128" r="8" fill="#ce93d8"/>
  <ellipse cx="160" cy="143" rx="10" ry="7" fill="#ce93d8"/>

  <!-- Person top-right -->
  <circle cx="350" cy="125" r="18" fill="rgba(129,199,132,0.2)" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="350" cy="118" r="8" fill="#81c784"/>
  <ellipse cx="350" cy="133" rx="10" ry="7" fill="#81c784"/>

  <!-- Person mid-left -->
  <circle cx="140" cy="270" r="15" fill="rgba(255,183,77,0.2)" stroke="#ffb74d" stroke-width="1.5"/>
  <circle cx="140" cy="264" r="7" fill="#ffb74d"/>
  <ellipse cx="140" cy="277" rx="9" ry="6" fill="#ffb74d"/>

  <!-- Person mid-right -->
  <circle cx="370" cy="260" r="15" fill="rgba(240,98,146,0.2)" stroke="#f06292" stroke-width="1.5"/>
  <circle cx="370" cy="254" r="7" fill="#f06292"/>
  <ellipse cx="370" cy="267" rx="9" ry="6" fill="#f06292"/>

  <!-- Person bottom-left -->
  <circle cx="190" cy="335" r="13" fill="rgba(77,208,225,0.2)" stroke="#4dd0e1" stroke-width="1.5"/>
  <circle cx="190" cy="330" r="6" fill="#4dd0e1"/>
  <ellipse cx="190" cy="341" rx="8" ry="5" fill="#4dd0e1"/>

  <!-- Person bottom-right -->
  <circle cx="320" cy="345" r="13" fill="rgba(255,213,79,0.2)" stroke="#ffd54f" stroke-width="1.5"/>
  <circle cx="320" cy="340" r="6" fill="#ffd54f"/>
  <ellipse cx="320" cy="351" rx="8" ry="5" fill="#ffd54f"/>

  <!-- Clock arc at bottom -->
  <path d="M160 400 A130 50 0 0 1 352 400" fill="none" stroke="rgba(255,213,79,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tick marks on arc -->
  <line x1="180" y1="393" x2="180" y2="400" stroke="rgba(255,213,79,0.4)" stroke-width="1.5"/>
  <line x1="216" y1="388" x2="216" y2="395" stroke="rgba(255,213,79,0.4)" stroke-width="1.5"/>
  <line x1="256" y1="386" x2="256" y2="393" stroke="rgba(255,213,79,0.5)" stroke-width="2"/>
  <line x1="296" y1="388" x2="296" y2="395" stroke="rgba(255,213,79,0.4)" stroke-width="1.5"/>
  <line x1="332" y1="393" x2="332" y2="400" stroke="rgba(255,213,79,0.4)" stroke-width="1.5"/>

  <!-- Arrow on arc -->
  <polygon points="348,397 356,400 350,405" fill="rgba(255,213,79,0.5)"/>

  <!-- Small star sparkles -->
  <circle cx="110" cy="120" r="2" fill="white" opacity="0.3"/>
  <circle cx="400" cy="100" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="90" cy="350" r="2" fill="white" opacity="0.2"/>
  <circle cx="420" cy="340" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="256" cy="90" r="2" fill="white" opacity="0.3"/>
</svg>
