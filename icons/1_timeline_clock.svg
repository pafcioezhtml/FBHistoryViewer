<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#ffab00"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg1)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>

  <!-- Data point dots along the rim -->
  <circle cx="256" cy="86" r="6" fill="#4fc3f7"/>
  <circle cx="341" cy="103" r="5" fill="#81c784"/>
  <circle cx="403" cy="171" r="7" fill="#ffb74d"/>
  <circle cx="426" cy="256" r="5" fill="#f48fb1"/>
  <circle cx="403" cy="341" r="6" fill="#ce93d8"/>
  <circle cx="341" cy="409" r="4" fill="#4fc3f7"/>
  <circle cx="256" cy="426" r="7" fill="#81c784"/>
  <circle cx="171" cy="409" r="5" fill="#ffb74d"/>
  <circle cx="109" cy="341" r="6" fill="#f48fb1"/>
  <circle cx="86" cy="256" r="4" fill="#ce93d8"/>
  <circle cx="109" cy="171" r="7" fill="#4fc3f7"/>
  <circle cx="171" cy="103" r="5" fill="#81c784"/>

  <!-- Clock face inner circle -->
  <circle cx="256" cy="256" r="130" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Hour hand as chat bubble trail -->
  <path d="M256 256 L256 155" stroke="url(#gold1)" stroke-width="8" stroke-linecap="round"/>
  <!-- Chat bubble at tip -->
  <rect x="240" y="130" width="32" height="24" rx="8" fill="#ffd54f"/>
  <polygon points="250,154 256,162 258,154" fill="#ffd54f"/>

  <!-- Minute hand -->
  <path d="M256 256 L330 200" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Small chat bubble at tip -->
  <rect x="320" y="180" width="24" height="18" rx="6" fill="white" opacity="0.9"/>
  <polygon points="328,198 332,204 335,198" fill="white" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="url(#gold1)"/>
  <circle cx="256" cy="256" r="5" fill="white"/>

  <!-- Spiral trail of small bubbles -->
  <circle cx="270" cy="230" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="285" cy="240" r="3" fill="rgba(255,255,255,0.25)"/>
  <circle cx="295" cy="255" r="3.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="290" cy="275" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="275" cy="288" r="2.5" fill="rgba(255,255,255,0.12)"/>
</svg>
